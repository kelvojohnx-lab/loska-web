{% extends 'base.html' %}
{% block title %}Buy Airtime – Loska Communications{% endblock %}
{% block content %}
<div class="airtime-page"><div class="container">
  <div class="airtime-card">
    <div class="card-header" style="text-align:center;margin-bottom:32px">
      <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--black),var(--black-soft));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.8rem;color:var(--gold)"><i class="fas fa-sim-card"></i></div>
      <h2 style="font-size:1.5rem;margin-bottom:4px">Buy Airtime</h2>
      <p style="color:var(--gray-600);font-size:.9rem">Instant top-up for Safaricom, Airtel & Telkom</p>
    </div>
    <form method="POST" data-validate>
      <div class="form-group"><label>Select Network <span>*</span></label>
        <div class="network-grid">
          <div class="network-option"><input type="radio" name="network" id="net-saf" value="Safaricom" required><label for="net-saf"><div class="net-icon net-safaricom">S</div>Safaricom</label></div>
          <div class="network-option"><input type="radio" name="network" id="net-air" value="Airtel"><label for="net-air"><div class="net-icon net-airtel">A</div>Airtel</label></div>
          <div class="network-option"><input type="radio" name="network" id="net-tel" value="Telkom"><label for="net-tel"><div class="net-icon net-telkom">T</div>Telkom</label></div>
        </div>
      </div>
      <div class="form-group"><label>Phone Number <span>*</span></label><div class="input-group"><i class="fas fa-phone-alt"></i><input type="tel" class="form-control" id="phone" name="phone" placeholder="07XX XXX XXX" required pattern="[0-9+]{10,13}"></div></div>
      <div class="form-group"><label>Amount <span>*</span></label>
        <div class="amount-presets mb-2">{% for amt in [10,20,50,100,200,500,1000] %}<button type="button" class="amount-btn" data-value="{{ amt }}">KSh {{ amt }}</button>{% endfor %}</div>
        <div class="input-group"><i class="fas fa-money-bill-wave"></i><input type="number" class="form-control" id="amount" name="amount" placeholder="Or enter custom amount" required min="5" max="10000"></div>
      </div>
      <div class="form-group"><label>Payment Method <span>*</span></label>
        <div class="payment-methods">
          <div class="pay-option"><input type="radio" name="payment_method" id="pay-mpesa-air" value="mpesa" checked><label for="pay-mpesa-air"><span style="background:#00A651;color:#fff;padding:3px 8px;border-radius:5px;font-size:.75rem;font-weight:800">M-PESA</span><div><strong>M-Pesa</strong><span>STK Push to your phone</span></div></label></div>
          <div class="pay-option"><input type="radio" name="payment_method" id="pay-wallet" value="wallet"><label for="pay-wallet"><i class="fas fa-wallet" style="color:var(--gold-dark);font-size:1.3rem"></i><div><strong>Account Wallet</strong><span>Deduct from balance</span></div></label></div>
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-block btn-lg mt-3"><i class="fas fa-bolt"></i> Buy Airtime Now</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:.78rem;color:var(--gray-400)"><i class="fas fa-shield-alt"></i> All transactions are encrypted and secure</div>
  </div>
</div></div>
{% endblock %}
